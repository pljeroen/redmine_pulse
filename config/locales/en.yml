  label_pulse_views: "Saved views"
  label_pulse_views_empty: "You have no saved views yet."
  label_pulse_view_new: "New saved view"
  label_pulse_view_edit: "Edit saved view"
  label_pulse_view_name: "Name"
  label_pulse_view_visibility: "Visibility"
  label_pulse_view_scope: "Project scope"
  label_pulse_view_lens: "Lens"
  label_pulse_view_profile: "Scoring profile id"
  label_pulse_view_select: "Select"
  label_pulse_view_roles: "Visible to roles"
  label_pulse_view_roles_help: "Used when Visibility is 'roles' — members holding any selected role can see this view."
  label_pulse_view_visibility_help: "Private (only you), public (any cockpit viewer), or roles (selected roles). Publishing public/roles needs the manage-public-views permission."
  label_pulse_view_scope_help: "All projects, a selected set, or projects filtered by project status."
  label_pulse_view_scope_projects: "Selected projects"
  label_pulse_view_scope_projects_help: "Used when Project scope is 'selected' — only these projects appear in the cockpit."
  label_pulse_view_scope_status: "Filter by project status"
  label_pulse_view_scope_status_help: "Used when Project scope is 'status filter': shows only projects of the chosen status (active / closed / archived)."
  label_pulse_view_sort: "Sort by"
  label_pulse_view_sort_help: "The cockpit sort column and direction saved with this view."
  label_pulse_view_prefs_rag_green_min: "RAG green threshold"
  label_pulse_view_prefs_rag_amber_min: "RAG amber threshold"
  label_pulse_view_prefs_help: "Per-view threshold preferences; leave blank to use the plugin defaults."
  # Standard action/notice keys used by the saved-views views/controller. Redmine core
  # already defines these; declared here too so the plugin's i18n-coverage guard resolves
