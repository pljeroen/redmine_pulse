  # ── settings help (E1): per-field inline help + per-group intros ─────────────
  label_pulse_help_group_enrichment: "This section lets you point Pulse at extra fields you already use in Redmine to make the score smarter. You almost never need to touch it - leave everything blank and Pulse scores on standard Redmine data alone."
  label_pulse_help_group_weights: "This decides how much each health signal counts toward the score. The defaults are balanced and work well for most teams, so leave every box blank unless you want to emphasise something. If you do change them, either fill in all five (they must add up to 1.0) or leave all five blank."
  label_pulse_help_group_thresholds: "This sets the score cut-offs for the Red, Amber and Green health chips. The defaults are sensible - leave them blank unless your team wants a stricter or more relaxed definition of a healthy project."
  label_pulse_help_group_windows: "This tunes how far back Pulse looks and how quickly a project is flagged as quiet, risky or blocked. The defaults suit most teams - leave everything blank unless a score feels too jumpy or too forgiving."
  label_pulse_help_effort_field: "Point Pulse at a number field you already use (like story points or estimated hours) so \"how much is done\" is measured by effort instead of just issue counts. Enter the field's number - find it under Administration -> Custom fields. Leave blank if unsure; Progress will simply count issues (done vs total). Default: blank."
  # effort-field auto-detect (suggest-only): shown under the effort-field input when it is
  # blank and Pulse finds numeric custom fields whose name looks like effort/story points.
  label_pulse_effort_field_detected: "Detected numeric fields you could use as effort (enter one of these IDs above):"
  label_pulse_help_risk_trackers: "Choose which issue types (trackers) represent risk - for example a \"Risk\" or \"Issue\" tracker - so open ones drag a project's score down, with higher-priority ones counting more. Leave nothing selected if unsure; the risk signal simply stays switched off. Default: none selected."
  label_pulse_help_blocked_status: "Tell Pulse which status means work is stuck - for example \"On hold\" - so open issues sitting there count as blocked. Enter the status's number - find it under Administration -> Issue statuses. Leave blank if unsure; Pulse still counts issues blocked by a \"blocks\" relation. Default: blank."
  label_pulse_help_weight_staleness: "How much a project going quiet - no recent activity - pulls its score down. Raise it if you care most about projects that have gone silent. The five weights must add up to 1.0. Leave blank if unsure. Default: 0.25."
  label_pulse_help_weight_progress: "How much \"how far along the work is\" counts toward the score. Raise it if finishing work matters most to you. The five weights must add up to 1.0. Leave blank if unsure. Default: 0.25."
  label_pulse_help_weight_momentum: "How much recent momentum - whether a project is speeding up or slowing down - counts toward the score. Raise it if you care most about keeping teams moving. The five weights must add up to 1.0. Leave blank if unsure. Default: 0.20."
  label_pulse_help_weight_risk_load: "How much a pile-up of risky issues pulls the score down. Only has an effect once you pick risk trackers above. The five weights must add up to 1.0. Leave blank if unsure. Default: 0.15."
  label_pulse_help_weight_blocked_load: "How much stuck or on-hold work pulls the score down. Raise it if blockers are your biggest worry. The five weights must add up to 1.0. Leave blank if unsure. Default: 0.15."
  label_pulse_help_weight_coverage_gap: "How much poorly-planned work - issues missing an estimate, an owner or a due date - pulls the score down. Only counts when you switch the signal on below. Leave blank if unsure. Default: 0.15."
  label_pulse_help_enable_coverage_gap: "Switch this on to also score how well your open issues are planned - whether they have an estimate, an owner and a due date. Off by default; leave it off unless you actively want to track planning quality."
  label_pulse_help_rag_green_min: "The score a project needs to earn a Green (healthy) chip - anything at or above this shows Green. Raise it to make Green harder to reach. Leave blank if unsure. Default: 67."
  label_pulse_help_rag_amber_min: "The score below which a project turns Red (needs attention); between this and the Green line it shows Amber. Raise it to flag more projects as Red. Leave blank if unsure. Default: 34."
  label_pulse_help_h_stale: "How many days of silence before a project is treated as fully gone-quiet. Lower it to flag quiet projects sooner. Leave blank if unsure. Default: 180 days."
  label_pulse_help_h_risk: "How many risky issues need to pile up before the risk signal bottoms out the score. Lower it to make risk bite harder. Only matters once you pick risk trackers. Leave blank if unsure. Default: 50."
  label_pulse_help_h_blocked: "How many stuck issues need to pile up before the blocked signal bottoms out the score. Lower it to make blockers bite harder. Leave blank if unsure. Default: 20."
  label_pulse_help_activity_window_days: "How many days of recent activity the momentum trend and the little activity chart look back over. Narrower reacts faster; wider is steadier. Leave blank if unsure. Default: 30 days."
  label_pulse_help_momentum_activity_half: "How busy a project must be in the recent window to count as \"ticking along normally\". Lower it and a project looks active with less traffic. Leave blank if unsure. Default: 8."
  label_pulse_help_momentum_direction_bias: "How much finishing more than you start (or the reverse) nudges the momentum trend up or down. Set 0 to ignore direction and score on busyness alone. Leave blank if unsure. Default: 0.15."
  label_pulse_help_on_track_threshold: "How healthy a project must be before its \"main concern\" simply reads \"On track\" instead of naming a weak spot. Raise it and fewer projects earn \"On track\". Leave blank if unsure. Default: 0.5."
  label_pulse_help_snapshot_max_age_minutes: "How long Pulse reuses a saved score before working it out again, so the dashboard loads fast. A lower number keeps scores fresher but recalculates more often; 0 means only refresh when the project's data actually changes. Leave blank if unsure. Default: 60 minutes."
  # alerting contract (C6): health-alert email + settings labels.
  label_pulse_settings_alerting: "Health alerting"
  label_pulse_help_group_alerting: "This can email your team when a project's health changes, so nobody has to keep checking the dashboard. It is off until you set it up, and it also needs your administrator to schedule the regular scan. Leave both fields blank if you are not using alerts yet."
  label_pulse_alert_auto_subscribe_role_id: "Auto-subscribe role"
  label_pulse_help_alert_auto_subscribe_role_id: "Automatically email everyone with this role when a project's health changes, so you do not have to add watchers by hand. Pick the role from the list. Leave blank if unsure; only people who chose to watch a project get alerts. Default: blank (off)."
  label_pulse_alert_score_delta_threshold: "Score-delta alert threshold"
  label_pulse_help_alert_score_delta_threshold: "How big a jump or drop in a project's score should trigger an alert - a bigger number means only large swings get flagged. Leave blank or 0 if unsure; this alert stays off. Default: blank (off)."
  label_pulse_alert_auto_subscribe_disabled: "(disabled — no auto-subscribe)"
