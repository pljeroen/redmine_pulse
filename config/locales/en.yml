# English locale (shipped in v1). Structure is ready for additional locales
# (SOFT-I18N: all user-facing strings localizable via config/locales).
en:
  project_module_pulse: "Pulse"
  label_pulse: "Pulse"
  label_pulse_portfolio: "Portfolio health"

  # ── controllers-api contract: the 5 NEW canonicalized keys (D-CA-OQ01/04) ────
  label_pulse_visibility_note: "Health computed from issues visible to you."
  label_pulse_rag_red: "Red"
  label_pulse_rag_amber: "Amber"
  label_pulse_rag_green: "Green"
  label_pulse_rag_aria_label: "Project health: %{state}"

  # ── R-A no-data state (THAW-RB-001) — a 0-issue project has nothing to score ──
  label_pulse_rag_no_data: "No data"
  label_pulse_no_data: "No data — no issues to score yet"
  label_pulse_no_recent_activity: "No recent activity"

  # ── additional user-facing strings used by the HTML views/controllers ────────
  label_pulse_health_score: "Health score"
  label_pulse_dominant_signal: "Dominant signal"
  # R-A relabel: the portfolio "why" column reads "Main concern" (lens vocabulary),
  # replacing the old "Dominant signal" wording. API field name stays dominant_signal.
  label_pulse_main_concern: "Main concern"
  label_pulse_apply_lens: "Apply lens"
  label_pulse_signal_completeness: "Signal completeness"
  label_pulse_lens: "Lens"
  label_pulse_signal: "Signal"
  label_pulse_contribution: "Contribution"
  label_pulse_weight: "Effective weight"
  label_pulse_value: "Value"
  label_pulse_sparkline: "Recent activity"
  label_pulse_milestones: "Upcoming milestones"
  label_pulse_no_milestones: "No upcoming milestones."
  label_pulse_gantt_link: "Open Gantt chart"
  label_pulse_empty_portfolio: "No projects are visible to you yet."
  label_pulse_refresh: "Refresh"
  label_pulse_open_effort: "Open effort"

  # Lens display names.
  label_pulse_lens_health: "Health"
  label_pulse_lens_at_risk: "At risk"
  label_pulse_lens_stale: "Stale"
  label_pulse_lens_done: "Done"
  label_pulse_lens_blocked: "Blocked"

  # Main-concern (lens vocabulary) labels for the severity-first dominant signal that
  # has no direct lens key: momentum -> "Losing momentum", progress -> "Behind schedule"
  # (staleness/risk_load/blocked_load reuse the lens labels above — Stale/At risk/Blocked).
  label_pulse_concern_momentum: "Losing momentum"
  label_pulse_concern_progress: "Behind schedule"
  # momentum-broaden D2: shown as the main concern when the worst active signal is itself
  # healthy (n >= 0.5) — there is no concern worth naming.
  label_pulse_on_track: "On track"

  pulse:
    computed_ago: "computed %{n} %{unit} ago"
    # Time-unit words for the "computed N <unit> ago" string (I18N-F6). The presenter
    # resolves the unit through these keys so a translated locale emits a translated unit;
    # the English values keep the rendered text identical ("computed 3 days ago").
    unit_seconds: "seconds"
    unit_minutes: "minutes"
    unit_hours: "hours"
    unit_days: "days"
    # Singular forms, used when N == 1 ("computed 1 minute ago"). A translated locale
    # MUST provide BOTH the plural (unit_*s) and singular (unit_*) forms — the presenter
    # picks the singular key at N == 1 and the plural key otherwise; a missing key falls
    # back to the English word.
    unit_second: "second"
    unit_minute: "minute"
    unit_hour: "hour"
    unit_day: "day"
    refresh_done: "Pulse cache refreshed."
    enable_hint_staleness: "inactive — staleness needs visible activity to compute"
    enable_hint_progress: "inactive — map an effort/story-points field to enable progress"
    enable_hint_momentum: "inactive — momentum needs visible activity to compute"
    enable_hint_risk_load: "inactive — map a risk tracker to enable risk load"
    enable_hint_blocked_load: "inactive — blocked load needs visible open issues"
  pulse_enable_hint_generic: "inactive — map an enrichment field to enable"

  # ── settings validation rejection (CA-23 / CA-A10-001) ───────────────────────
  # Surfaced as flash[:error] when an out-of-bounds settings value is rejected (the
  # prior valid value is kept; the invalid input is never persisted).
  error_pulse_settings_rejected: "Some Pulse settings were out of range and were not saved (kept the previous value): %{fields}."

  # ── scoring profiles (C4) ────────────────────────────────────────────────────
  label_pulse_scored_under: "Scored under"
  label_pulse_profile_switcher: "Scoring profile"
  label_pulse_apply: "Apply"
  # FC-C4-12 / FR-C4-09: the surfaced dangling-fallback warning + its subject fragments.
  label_pulse_profile_subject_selected: "the selected profile"
  label_pulse_profile_subject_role_bound: "the role-bound profile"
  pulse_profile_dangling_warning: "%{subject} %{id} is not a published profile — falling back to the system default."
  # C5 (RC-C5-06 / FC-C5-16): the surfaced dangling-lens_ref warning (an active saved view's
  # lens_ref referenced a removed/unknown lens; the cockpit fell back to the default lens).
  pulse_lens_dangling_warning: "%{lens} is not a known lens — falling back to the default (health) lens."

