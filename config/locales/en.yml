  # ── settings help (E1): per-field inline help + per-group intros ─────────────
  label_pulse_help_group_enrichment: "Optional mappings that turn on or refine signals. Leave them blank to score on standard Redmine fields only - Pulse never invents data; an unmapped signal is shown as inactive and its weight is shared across the active signals."
  label_pulse_help_group_weights: "How much each of the five signals counts toward the health score. The five values must add up to 1.0. Leave every weight blank to use the shipped defaults. If a signal is inactive for a project, its weight is redistributed over the active ones. Tip: enter all five, or leave all five blank."
  label_pulse_help_group_thresholds: "The score cut-offs (0-100) for the Red / Amber / Green health chip. Amber must be at or below Green."
  label_pulse_help_group_windows: "Time horizons (in days) that decide how forgiving each signal is, plus the trailing window for momentum and the sparkline. Larger horizon = more forgiving."
  label_pulse_help_effort_field: "Numeric ID of an issue custom field (e.g. story points) to use as 'effort' for the Progress signal. Must be an integer/float field. Blank = Progress counts issues (open vs total) instead. Default: blank."
  # effort-field auto-detect (suggest-only): shown under the effort-field input when it is
  # blank and Pulse finds numeric custom fields whose name looks like effort/story points.
  label_pulse_effort_field_detected: "Detected numeric fields you could use as effort (enter one of these IDs above):"
  label_pulse_help_risk_trackers: "Trackers whose open issues count as risk (weighted by priority). Selecting none turns the Risk-load signal off and shares its weight across the other signals. Default: none selected."
  label_pulse_help_blocked_status: "Numeric ID of an issue status that means 'blocked' (e.g. On hold). Open issues in this status count toward the Blocked-load signal, on top of 'blocks'-relation blocking. Blank = relations only. Default: blank."
  label_pulse_help_weight_staleness: "Weight of the Staleness signal (time since the last activity). The five weights must add up to 1.0. Default: 0.25."
  label_pulse_help_weight_progress: "Weight of the Progress signal (share of work completed). Inactive when a project has no effort to measure, in which case its weight is shared out. The five weights must add up to 1.0. Default: 0.25."
  label_pulse_help_weight_momentum: "Weight of the Momentum signal (recent activity - opens, closes, commits, comments - over the activity window, with a small net-completion bias). The five weights must add up to 1.0. Default: 0.20."
  label_pulse_help_weight_risk_load: "Weight of the Risk-load signal (open issues in your mapped risk trackers). No effect until you map a risk tracker; its weight is then shared out. The five weights must add up to 1.0. Default: 0.15."
  label_pulse_help_weight_blocked_load: "Weight of the Blocked-load signal (count of blocked open issues). The five weights must add up to 1.0. Default: 0.15."
  label_pulse_help_weight_coverage_gap: "Weight of the Planning-coverage signal (how many open issues have an estimate, an assignee, and a schedule). Only used when the signal is enabled below; the enabled weights are renormalised to add up to 1.0. Default: 0.15."
  label_pulse_help_enable_coverage_gap: "Turn on the optional Planning-coverage signal, which scores how well your open issues are planned (estimate + assignee + due date or target version). Off by default; enabling it adds a sixth weight and reshares the others."
  label_pulse_help_rag_green_min: "Lowest health score (0-100) that still shows GREEN. Must be at or above the Amber threshold. Higher = stricter. Default: 67."
  label_pulse_help_rag_amber_min: "Lowest health score (0-100) that still shows AMBER; below this is RED. Must be at or below the Green threshold. Default: 34."
  label_pulse_help_h_stale: "Days of inactivity at which a project counts as fully stale. Lower = flags quiet projects sooner. Default: 180 days."
  label_pulse_help_h_risk: "Risk threshold: the priority-weighted total of open risk-tracker issues at which Risk load hits zero. Lower = risk bites harder. Only used when a risk tracker is mapped. Default: 50."
  label_pulse_help_h_blocked: "Number of blocked open issues at which the Blocked-load signal hits zero. Lower = blockers bite harder. Default: 20."
  label_pulse_help_activity_window_days: "Trailing window in days for the Momentum signal and the activity sparkline. Narrower = more reactive; wider = steadier. Default: 30 days."
  label_pulse_help_momentum_activity_half: "How much recent activity (opens, closes, commits, comments) in the activity window counts as neutral momentum (0.5). Lower = a project looks active with less traffic. Default: 8."
  label_pulse_help_momentum_direction_bias: "How much net issue completion (closes minus opens) nudges momentum up or down, capped at ±this. 0 = ignore direction, score on activity alone. Range 0-0.5. Default: 0.15."
  label_pulse_help_on_track_threshold: "When a project's worst signal is at or above this (0-1), its main concern reads \"On track\" instead of naming a signal. Higher = stricter (fewer projects read as on track). Default: 0.5."
  label_pulse_help_snapshot_max_age_minutes: "How fresh the cockpit stays. The first time someone opens Pulse after a project's snapshot is older than this many minutes, it recomputes and its \"computed X ago\" resets. Lower = fresher but recomputes more often. 0 = only recompute when the underlying data changes. Default: 60."
