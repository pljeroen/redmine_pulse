  label_pulse_weight_progress: "Progress weight"
  label_pulse_weight_momentum: "Momentum weight"
  label_pulse_weight_risk_load: "Risk load weight"
  label_pulse_weight_blocked_load: "Blocked load weight"
  label_pulse_weight_coverage_gap: "Planning coverage weight"
  label_pulse_enable_coverage_gap: "Enable planning-coverage signal"
  label_pulse_planning_coverage: "Planning coverage"
