  label_pulse_settings_overview: "Pulse gives every project a simple health score and a Red/Amber/Green chip on your portfolio dashboard, so you can see at a glance which projects need attention. It works out of the box with sensible defaults, so you can leave every field on this page blank and it will just work. Only change something here when you want to fine-tune how a score is calculated - and if in doubt, leave it blank."
