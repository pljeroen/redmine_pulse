  label_pulse_rag_green_min: "RAG green threshold"
  label_pulse_rag_amber_min: "RAG amber threshold"
  label_pulse_h_stale: "Staleness horizon (days)"
  label_pulse_h_risk: "Risk horizon"
  label_pulse_h_blocked: "Blocked horizon"
