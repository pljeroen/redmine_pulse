  # E1 self-service-overzicht: de begrijpelijke banner bovenaan het formulier.
  label_pulse_settings_overview: "Pulse geeft elk project een eenvoudige gezondheidsscore en een rood/oranje/groen-indicator op je portfolio-dashboard, zodat je in één oogopslag ziet welke projecten aandacht nodig hebben. Het werkt meteen goed met verstandige standaardwaarden, dus je kunt elk veld op deze pagina leeg laten en het werkt gewoon. Verander hier alleen iets als je wilt bijsturen hoe een score wordt berekend - en twijfel je, laat het dan leeg."
  label_pulse_settings_enrichment: "Verrijking"
  label_pulse_settings_weights: "Gewichten"
  label_pulse_settings_thresholds: "Drempels"
  label_pulse_settings_windows: "Vensters"
