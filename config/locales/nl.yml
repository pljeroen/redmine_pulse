  label_pulse_help_group_enrichment: "Optionele koppelingen die signalen inschakelen of verfijnen. Laat ze leeg om alleen op standaard Redmine-velden te scoren — Pulse verzint nooit gegevens; een niet-gekoppeld signaal wordt als inactief getoond en zijn gewicht wordt over de actieve signalen verdeeld."
  label_pulse_help_group_weights: "Hoeveel elk van de vijf signalen meetelt in de gezondheidsscore. De vijf waarden moeten optellen tot 1,0. Laat alle gewichten leeg om de meegeleverde standaardwaarden te gebruiken. Als een signaal voor een project inactief is, wordt zijn gewicht over de actieve signalen herverdeeld. Tip: vul alle vijf in, of laat alle vijf leeg."
  label_pulse_help_group_thresholds: "De scoregrenzen (0-100) voor de rode / oranje / groene gezondheidsindicator. Oranje moet gelijk aan of lager dan groen zijn."
  label_pulse_help_group_windows: "Tijdshorizons (in dagen) die bepalen hoe mild elk signaal is, plus het achterliggende venster voor momentum en de sparkline. Grotere horizon = milder."
  label_pulse_help_effort_field: "Numeriek ID van een aangepast issue-veld (bijv. story points) dat als 'inspanning' voor het Voortgang-signaal wordt gebruikt. Moet een geheel-getal- of decimaalveld zijn. Leeg = Voortgang telt in plaats daarvan issues (open versus totaal). Standaard: leeg."
  label_pulse_effort_field_detected: "Gevonden numerieke velden die je als inspanning kunt gebruiken (vul hierboven een van deze ID's in):"
  label_pulse_help_risk_trackers: "Trackers waarvan de openstaande issues als risico tellen (gewogen naar prioriteit). Niets selecteren schakelt het Risicolast-signaal uit en verdeelt zijn gewicht over de andere signalen. Standaard: niets geselecteerd."
  label_pulse_help_blocked_status: "Numeriek ID van een issuestatus die 'geblokkeerd' betekent (bijv. In de wacht). Openstaande issues met deze status tellen mee voor het Blokkadelast-signaal, bovenop blokkering via 'blokkeert'-relaties. Leeg = alleen relaties. Standaard: leeg."
  label_pulse_help_weight_staleness: "Gewicht van het Veroudering-signaal (tijd sinds de laatste activiteit). De vijf gewichten moeten optellen tot 1,0. Standaard: 0,25."
  label_pulse_help_weight_progress: "Gewicht van het Voortgang-signaal (aandeel voltooid werk). Inactief wanneer een project geen meetbare inspanning heeft; het gewicht wordt dan verdeeld. De vijf gewichten moeten optellen tot 1,0. Standaard: 0,25."
  label_pulse_help_weight_momentum: "Gewicht van het Momentum-signaal (recente activiteit — geopend, gesloten, commits, reacties — over het activiteitsvenster, met een kleine netto-voltooiingsbias). De vijf gewichten moeten optellen tot 1,0. Standaard: 0,20."
  label_pulse_help_weight_risk_load: "Gewicht van het Risicolast-signaal (openstaande issues in je gekoppelde risicotrackers). Geen effect totdat je een risicotracker koppelt; het gewicht wordt dan verdeeld. De vijf gewichten moeten optellen tot 1,0. Standaard: 0,15."
  label_pulse_help_weight_blocked_load: "Gewicht van het Blokkadelast-signaal (aantal geblokkeerde openstaande issues). De vijf gewichten moeten optellen tot 1,0. Standaard: 0,15."
  label_pulse_help_weight_coverage_gap: "Gewicht van het Planningsdekking-signaal (hoeveel openstaande issues een schatting, een toegewezene en een planning hebben). Alleen gebruikt wanneer het signaal hieronder is ingeschakeld; de ingeschakelde gewichten worden opnieuw genormaliseerd tot 1,0. Standaard: 0,15."
  label_pulse_help_enable_coverage_gap: "Schakel het optionele Planningsdekking-signaal in, dat scoort hoe goed je openstaande issues gepland zijn (schatting + toegewezene + streefdatum of doelversie). Standaard uit; inschakelen voegt een zesde gewicht toe en herverdeelt de overige."
  label_pulse_help_rag_green_min: "Laagste gezondheidsscore (0-100) die nog GROEN toont. Moet gelijk aan of hoger dan de oranje drempel zijn. Hoger = strenger. Standaard: 67."
  label_pulse_help_rag_amber_min: "Laagste gezondheidsscore (0-100) die nog ORANJE toont; daaronder is ROOD. Moet gelijk aan of lager dan de groene drempel zijn. Standaard: 34."
  label_pulse_help_h_stale: "Dagen inactiviteit waarbij een project als volledig verouderd telt. Lager = markeert stille projecten sneller. Standaard: 180 dagen."
  label_pulse_help_h_risk: "Risicodrempel: het naar prioriteit gewogen totaal van openstaande risicotracker-issues waarbij Risicolast op nul komt. Lager = risico weegt zwaarder. Alleen gebruikt wanneer een risicotracker is gekoppeld. Standaard: 50."
  label_pulse_help_h_blocked: "Aantal geblokkeerde openstaande issues waarbij het Blokkadelast-signaal op nul komt. Lager = blokkades wegen zwaarder. Standaard: 20."
  label_pulse_help_activity_window_days: "Achterliggend venster in dagen voor het Momentum-signaal en de activiteits-sparkline. Smaller = reactiever; breder = stabieler. Standaard: 30 dagen."
  label_pulse_help_momentum_activity_half: "Hoeveel recente activiteit (geopend, gesloten, commits, reacties) in het activiteitsvenster als neutraal momentum (0,5) telt. Lager = een project lijkt actief bij minder verkeer. Standaard: 8."
  label_pulse_help_momentum_direction_bias: "Hoeveel netto issue-voltooiing (gesloten min geopend) het momentum omhoog of omlaag duwt, begrensd op ±deze waarde. 0 = negeer richting, scoor alleen op activiteit. Bereik 0-0,5. Standaard: 0,15."
  label_pulse_help_on_track_threshold: "Wanneer het slechtste signaal van een project op of boven deze waarde ligt (0-1), toont het belangrijkste aandachtspunt \"Op koers\" in plaats van een signaal te noemen. Hoger = strenger (minder projecten lezen als op koers). Standaard: 0,5."
  label_pulse_help_snapshot_max_age_minutes: "Hoe vers de cockpit blijft. De eerste keer dat iemand Pulse opent nadat de momentopname van een project ouder is dan dit aantal minuten, wordt deze opnieuw berekend en wordt \"X geleden berekend\" gereset. Lager = verser maar herberekent vaker. 0 = alleen herberekenen wanneer de onderliggende gegevens wijzigen. Standaard: 60."
