  label_pulse_settings_webhooks: "Uitgaande webhooks"
  label_pulse_help_group_webhooks: "Dit kan automatisch een ander systeem - zoals Slack, Teams of je eigen tool - op de hoogte brengen zodra de gezondheid van een project verandert. Het is een technische koppeling, standaard uit, en er wordt nooit iets verzonden totdat je hier een bestemming toevoegt. Laat deze sectie leeg als je het niet nodig hebt."
  label_pulse_webhook_endpoints_global: "Globale webhook-endpoints"
  label_pulse_help_webhook_endpoints_global: "Endpoints die de gezondheidsovergangen van elk project ontvangen. Elk endpoint heeft een URL, een HMAC-geheim, een aan/uit-vlag en optionele per-endpoint-overschrijvingen."
  label_pulse_webhook_url: "Endpoint-URL"
  label_pulse_webhook_secret: "HMAC-geheim"
  label_pulse_webhook_enabled: "Ingeschakeld"
  label_pulse_webhook_event_filter: "Gebeurtenisfilter"
  label_pulse_help_webhook_event_filter: "Vink aan welke soorten verandering naar deze bestemming moeten worden gestuurd. Vink niets aan om elke verandering te sturen - een omslag van gezondheidsband, een nieuw belangrijkste aandachtspunt, een project zonder gegevens, of een scherpe scoreverandering."
  label_pulse_webhook_ssrf_override: "Niet-openbaar doel toestaan (SSRF-overschrijving)"
  label_pulse_webhook_allow_http: "Gewone http:// toestaan (geen HTTPS)"
  label_pulse_webhook_redaction: "Optionele velden weglaten (previous, health.delta)"
  label_pulse_webhook_send_test: "Testgebeurtenis verzenden"
  label_pulse_webhook_secret_set: "Er is een geheim ingesteld — laat leeg om het te behouden, of voer een nieuwe waarde in om het te vervangen."
  label_pulse_webhook_secret_blank_keep: "Laat leeg om het huidige geheim te behouden; voer een waarde in om het in te stellen/te vervangen."
  label_pulse_webhook_remove: "Dit endpoint verwijderen"
