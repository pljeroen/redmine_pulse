  label_pulse_snapshot_max_age_minutes: "Versheidslimiet (minuten)"

  label_pulse_help_group_enrichment: "In deze sectie kun je Pulse laten kijken naar extra velden die je al in Redmine gebruikt, om de score slimmer te maken. Je hoeft dit bijna nooit aan te raken - laat alles leeg en Pulse scoort gewoon op standaard Redmine-gegevens."
  label_pulse_help_group_weights: "Dit bepaalt hoe zwaar elk gezondheidssignaal meetelt in de score. De standaardwaarden zijn in balans en werken goed voor de meeste teams, dus laat elk vak leeg tenzij je iets wilt benadrukken. Wijzig je ze toch, vul dan alle vijf in (ze moeten optellen tot 1,0) of laat alle vijf leeg."
  label_pulse_help_group_thresholds: "Dit stelt de scoregrenzen in voor de rode, oranje en groene gezondheidsindicatoren. De standaardwaarden zijn verstandig - laat ze leeg tenzij je team een strengere of soepelere definitie van een gezond project wil."
  label_pulse_help_group_windows: "Dit bepaalt hoe ver Pulse terugkijkt en hoe snel een project als stil, risicovol of geblokkeerd wordt gemarkeerd. De standaardwaarden passen bij de meeste teams - laat alles leeg tenzij een score te grillig of te mild aanvoelt."
  label_pulse_help_effort_field: "Wijs Pulse naar een getalveld dat je al gebruikt (zoals story points of geschatte uren), zodat \"hoeveel is af\" wordt gemeten aan inspanning in plaats van alleen het aantal issues. Vul het nummer van het veld in - te vinden onder Beheer -> Aangepaste velden. Weet je het niet zeker, laat leeg; Voortgang telt dan gewoon issues (af versus totaal). Standaard: leeg."
  label_pulse_effort_field_detected: "Gevonden numerieke velden die je als inspanning kunt gebruiken (vul hierboven een van deze ID's in):"
  label_pulse_help_risk_trackers: "Kies welke soorten issues (trackers) risico vertegenwoordigen - bijvoorbeeld een tracker \"Risico\" of \"Issue\" - zodat openstaande exemplaren de score van een project omlaag halen, waarbij hogere prioriteit zwaarder telt. Selecteer niets als je twijfelt; het risicosignaal blijft dan gewoon uit. Standaard: niets geselecteerd."
  label_pulse_help_blocked_status: "Vertel Pulse welke status betekent dat werk vastzit - bijvoorbeeld \"In de wacht\" - zodat openstaande issues daar als geblokkeerd tellen. Vul het nummer van de status in - te vinden onder Beheer -> Issuestatussen. Weet je het niet zeker, laat leeg; Pulse telt dan nog steeds issues die via een \"blokkeert\"-relatie geblokkeerd zijn. Standaard: leeg."
  label_pulse_help_weight_staleness: "Hoe zwaar een project dat stilvalt - geen recente activiteit - de score omlaag haalt. Verhoog dit als je vooral geeft om projecten die stil zijn gevallen. De vijf gewichten moeten optellen tot 1,0. Laat leeg voor de standaard: 0,25."
  label_pulse_help_weight_progress: "Hoe zwaar \"hoe ver het werk is\" meetelt in de score. Verhoog dit als het afronden van werk voor jou het belangrijkst is. De vijf gewichten moeten optellen tot 1,0. Laat leeg voor de standaard: 0,25."
  label_pulse_help_weight_momentum: "Hoe zwaar het recente momentum - versnelt of vertraagt een project - meetelt in de score. Verhoog dit als je vooral wilt dat teams in beweging blijven. De vijf gewichten moeten optellen tot 1,0. Laat leeg voor de standaard: 0,20."
  label_pulse_help_weight_risk_load: "Hoe zwaar een opeenstapeling van risicovolle issues de score omlaag haalt. Heeft pas effect zodra je hierboven risicotrackers kiest. De vijf gewichten moeten optellen tot 1,0. Laat leeg voor de standaard: 0,15."
  label_pulse_help_weight_blocked_load: "Hoe zwaar vastgelopen of in-de-wacht-werk de score omlaag haalt. Verhoog dit als blokkades je grootste zorg zijn. De vijf gewichten moeten optellen tot 1,0. Laat leeg voor de standaard: 0,15."
  label_pulse_help_weight_coverage_gap: "Hoe zwaar slecht gepland werk - issues zonder schatting, eigenaar of einddatum - de score omlaag haalt. Telt alleen mee als je het signaal hieronder aanzet. Laat leeg voor de standaard: 0,15."
  label_pulse_help_enable_coverage_gap: "Zet dit aan om ook te scoren hoe goed je openstaande issues gepland zijn - of ze een schatting, een eigenaar en een einddatum hebben. Standaard uit; laat het uit tenzij je actief de planningskwaliteit wilt volgen."
  label_pulse_help_rag_green_min: "De score die een project nodig heeft voor een groene (gezonde) indicator - alles op of boven deze waarde toont groen. Verhoog het om groen moeilijker te maken. Laat leeg voor de standaard: 67."
  label_pulse_help_rag_amber_min: "De score waaronder een project rood wordt (heeft aandacht nodig); tussen deze en de groene grens toont het oranje. Verhoog het om meer projecten als rood te markeren. Laat leeg voor de standaard: 34."
  label_pulse_help_h_stale: "Na hoeveel dagen stilte een project als volledig stilgevallen wordt behandeld. Verlaag het om stille projecten sneller te markeren. Laat leeg voor de standaard: 180 dagen."
  label_pulse_help_h_risk: "Hoeveel risicovolle issues moeten opstapelen voordat het risicosignaal de score naar de bodem brengt. Verlaag het om risico zwaarder te laten wegen. Telt pas als je risicotrackers kiest. Laat leeg voor de standaard: 50."
  label_pulse_help_h_blocked: "Hoeveel vastgelopen issues moeten opstapelen voordat het blokkadesignaal de score naar de bodem brengt. Verlaag het om blokkades zwaarder te laten wegen. Laat leeg voor de standaard: 20."
  label_pulse_help_activity_window_days: "Over hoeveel dagen recente activiteit de momentumtrend en het kleine activiteitsgrafiekje terugkijken. Smaller reageert sneller; breder is stabieler. Laat leeg voor de standaard: 30 dagen."
  label_pulse_help_momentum_activity_half: "Hoe druk een project in het recente venster moet zijn om als \"normaal doortikkend\" te tellen. Verlaag het en een project lijkt actief bij minder verkeer. Laat leeg voor de standaard: 8."
  label_pulse_help_momentum_direction_bias: "Hoeveel meer afronden dan starten (of andersom) de momentumtrend omhoog of omlaag duwt. Zet 0 om richting te negeren en alleen op drukte te scoren. Laat leeg voor de standaard: 0,15."
  label_pulse_help_on_track_threshold: "Hoe gezond een project moet zijn voordat zijn \"belangrijkste aandachtspunt\" gewoon \"Op koers\" leest in plaats van een zwak punt te noemen. Verhoog het en minder projecten verdienen \"Op koers\". Laat leeg voor de standaard: 0,5."
  label_pulse_help_snapshot_max_age_minutes: "Hoe lang Pulse een opgeslagen score hergebruikt voordat deze opnieuw wordt berekend, zodat het dashboard snel laadt. Een lager getal houdt scores verser maar herberekent vaker; 0 betekent alleen verversen wanneer de gegevens van het project daadwerkelijk wijzigen. Laat leeg voor de standaard: 60 minuten."
  # alerting contract (C6): gezondheidswaarschuwing e-mail + instellingslabels.
  label_pulse_settings_alerting: "Gezondheidswaarschuwingen"
  label_pulse_help_group_alerting: "Dit kan je team een e-mail sturen wanneer de gezondheid van een project verandert, zodat niemand het dashboard hoeft te blijven checken. Het staat uit totdat je het instelt, en je beheerder moet ook de reguliere scan inplannen. Laat beide velden leeg als je nog geen waarschuwingen gebruikt."
  label_pulse_alert_auto_subscribe_role_id: "Automatisch-abonneren rol"
  label_pulse_help_alert_auto_subscribe_role_id: "E-mail automatisch iedereen met deze rol wanneer de gezondheid van een project verandert, zodat je niet met de hand volgers hoeft toe te voegen. Kies de rol uit de lijst. Weet je het niet zeker, laat leeg; alleen mensen die er zelf voor kozen een project te volgen krijgen waarschuwingen. Standaard: leeg (uit)."
  label_pulse_alert_score_delta_threshold: "Scoreverschil-waarschuwingsdrempel"
  label_pulse_help_alert_score_delta_threshold: "Hoe grote sprong of daling in de score van een project een waarschuwing moet activeren - een hoger getal betekent dat alleen grote schommelingen worden gemeld. Weet je het niet zeker, laat leeg of 0; deze waarschuwing blijft uit. Standaard: leeg (uit)."
  label_pulse_alert_auto_subscribe_disabled: "(uitgeschakeld — niet automatisch abonneren)"
  # C6 (FR-C6-08): de per-project "Projectgezondheid volgen" opt-in-schakelaar op de cockpit.
  label_pulse_watch_health: "Projectgezondheid volgen"
  label_pulse_unwatch_health: "Projectgezondheid niet meer volgen"
  notice_pulse_health_watched: "Je volgt nu de gezondheidswaarschuwingen van dit project."
  notice_pulse_health_unwatched: "Je volgt de gezondheidswaarschuwingen van dit project niet meer."
  label_pulse_health_alert: "Pulse-gezondheidswaarschuwing"
  label_pulse_alert_project: "Project"
  label_pulse_alert_score: "Gezondheidsscore"
  label_pulse_alert_event_rag_transition: "gezondheidsband gewijzigd"
  label_pulse_alert_event_dominant_change: "belangrijkste aandachtspunt gewijzigd"
  label_pulse_alert_event_no_data_appeared: "geen scoorbare gegevens"
  label_pulse_alert_event_score_delta: "gezondheidsscore sterk veranderd"

