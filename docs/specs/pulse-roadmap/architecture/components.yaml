# Architecture components — coarse-grained; each carries substrate_touch (boolean).
# substrate_touch=true only when the component reads/writes a substrate path (compose/, configs/,
# Dockerfile/Caddyfile/nginx, K8s manifests, or an allowlisted scripts/ path). This is a Redmine
# plugin: business logic is Ruby lib/, persistence is db/migrate, presentation is app/views. The
# only operations-facing surface is the cron scheduling of the rake tasks.
spec_name: pulse-roadmap

components:
  - id: CMP-domain
    name: Scoring domain (registry, weight sets, lenses, profiles, alert rules)
    path: lib/pulse/domain
    contracts: [C1, C2, C3, C4, C6]
    layer: domain
    substrate_touch: false
  - id: CMP-ports
    name: Ports (profile provider, view store, alert-state, subscription, delivery, webhook)
    path: lib/pulse/ports
    contracts: [C4, C5, C6, C7]
    layer: port
    substrate_touch: false
  - id: CMP-adapters-persistence
    name: Persistence adapters + AR models (pulse_views, pulse_alert_states)
    path: lib/pulse/adapters, app/models
    contracts: [C4, C5, C6]
    layer: adapter
    substrate_touch: false
  - id: CMP-adapters-delivery
    name: Alert delivery (mailer + in-app) and outbound webhook adapter (HTTP/HMAC/SSRF)
    path: lib/pulse/adapters, app/mailers
    contracts: [C6, C7]
    layer: adapter
    substrate_touch: false
  - id: CMP-migrations
    name: Reversible migrations (pulse_views, pulse_alert_states)
    path: db/migrate
    contracts: [C5, C6]
    layer: adapter
    substrate_touch: false
  - id: CMP-controllers-views
    name: Controllers + views (saved-views UI, profile switcher, admin settings for profiles/webhooks)
    path: app/controllers, app/views, app/helpers
    contracts: [C4, C5, C7]
    layer: adapter
    substrate_touch: false
  - id: CMP-rake-ops
    name: Rake tasks (recompute, scan_and_alert) + operator cron scheduling guidance
    path: lib/tasks/pulse.rake, docs (ops guidance)
    contracts: [C6]
    layer: adapter
    substrate_touch: true
    substrate_note: >
      The rake tasks are the operations-facing surface: the operator schedules them via cron on the
      host. The task code is Ruby (lib/tasks) but the scheduling + ops guidance is a substrate/ops
      concern, so this component is flagged for substrate-bringup evidence (documented cron setup,
      idempotency, no-worker footprint claim).
