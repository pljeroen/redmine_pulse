# Validating example for contracts/schemas/project.json (rev 3).
# Per-project breakdown for project 11 (kernel-aios, red) — mirrors the portfolio seed's
# project A, expanded with drill links, effective weights, thresholds, retrospective
# sparkline, and a forward milestone (an operator-set Version due date, date-valued).
# Signals keyed by canonical name; provenance pinned per field; snapshot vs projection
# timestamps separate; projection clock/config exposed; forward axis non-empty because a
# due date exists (it would be [] if none did — never invented).
schema_version: "1.0"
snapshot_computed_at: { at: "2026-06-20T03:25:00Z", provenance: "computed" }
projected_at: { at: "2026-06-20T08:00:00Z", provenance: "computed" }
projection:
  clock_today: "2026-06-20"
  time_zone: "Europe/Amsterdam"
  activity_window_days: 30
  horizons: { staleness: 180, risk_load: 50, blocked_load: 20 }
visibility_note: "Health computed from issues visible to you."
project:
  project_id: 11
  identifier: "kernel-aios"
  name: "kernel-aios"
  url: "/projects/kernel-aios/pulse"
health_score: 29   # NEW momentum: round_half_up(4.17+7.5+8.5+3.0+6.0 = 29.17)
