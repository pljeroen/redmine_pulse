stated_ask: >
  Build an in-Redmine portfolio/project-health cockpit ("which project deserves attention next,
  and why") as a mature open-source community contribution — because nothing free, maintained, and
  Redmine-6-compatible exists. Basic-but-functional v1, with an API so external tools can connect.
shape: "Redmine 6.x plugin (Ruby/Rails system component)."
explicit_goals:
  - "Fill the confirmed gap: the only free/open/maintained Redmine portfolio-health plugin."
  - "Not clunky — good Gantt (reuse redmine_canvas_gantt) + meaningful portfolio cockpit."
  - "Give back to the community (the democratizing form of anti-extraction)."
  - "External visualization (Grafana / deferred LGTM plane) connects via a read API as option 1."
explicit_dislikes:
  - "Commercial/lock-in products (EasyRedmine, RedmineUP/RedmineX) — ruled out."
  - "Invented/projected calendar dates."
  - "Requiring bespoke setup that helps no other Redmine user."
stack_preferences: "Match Redmine: Ruby/Rails plugin framework, GPL-2.0, self-hosted."
operator_decisions:
  attention_lens: "composite health + selectable lenses (at-risk/stale/done/blocked)"
  v1_scope: "portfolio overview + per-project panel + read API"
  timelines: "retrospective (real history) + forward (operator-set Version due dates) — no invented dates"
  name: "redmine_pulse"
known_constraints:
  - "free/open GPL-2.0, self-hosted, no telemetry/lock-in"
  - "no invented dates; read-only over Redmine; permission-safe; graceful degradation"
unknowns:
  - "OQ-1 distribution account (GitHub org / redmine.org owner) — needed before publish, not before build"
  - "OQ-2 effort-field auto-detect default; OQ-3 activity-window default; OQ-4 RAG threshold defaults"
provenance: "Validated via web research (confirmed the market gap and redmine_canvas_gantt as the Gantt reuse) plus an internal requirements analysis of the data-source integration."
