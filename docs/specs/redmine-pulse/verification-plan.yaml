spec_name: redmine-pulse
acceptance_criteria:
  - id: AC-SCORE-DETERMINISM
    requirement: "Identical ProjectMetrics + Clock + ScoringConfig yield identical health_score/RAG/dominant_signal/lens keys."
    mechanism: TEST
    evidence_pointer: "test/unit/domain/scoring_determinism_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-SCORE-FORMULA
    requirement: "§4 formulas (per-signal n, weight redistribution, composite, dominant_signal, lens keys) produce expected outputs for golden fixtures incl. all edge cases: zero-issue, effort_total=0, no-activity, all-signals-inactive-but-standard, full-enrichment, and momentum closure cases (created-closed, reopen/reclose, closed->closed, open->open, window boundary instant, time-zone boundary)."
    mechanism: TEST
    evidence_pointer: "test/unit/domain/scoring_formula_test.rb + test/fixtures/scoring/*.yaml (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-DEGRADES
    requirement: "Standard-fields-only project yields a valid score; risk_load active:false + null; weight redistributed; signal_completeness reported; panel shows inactive rows."
    mechanism: TEST
    evidence_pointer: "test/unit/domain/graceful_degradation_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-EXPLAINABLE
    requirement: "Every breakdown present; all contributions >= 0; round_half_up(sum contributions) == health_score."
    mechanism: TEST
    evidence_pointer: "test/unit/domain/explainability_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-NO-DATES
    requirement: "Every rendered date/interval carries provenance in {redmine_timestamp,version_due_date,computed,derived_bucket}; no projected/estimated; zero Version due dates => empty forward axis."
    mechanism: TEST
    evidence_pointer: "test/unit/domain/date_provenance_test.rb + test/functional/timeline_provenance_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-PERMISSION-ACCESS
    requirement: "Response codes match §3.1 via a single visible-scope lookup (not bare authorize): 404 when project not in Project.visible(user), archived (Project.visible excludes archived), or nonexistent (existence not revealed); 403 only when project IS visible but role lacks view_pulse or pulse module disabled; portfolio omits non-visible/non-module projects; REST-disabled => 401/403. Tested separately: no-permission(403), module-disabled(403), archived(404), invisible-private(404), nonexistent(404), logged-out, REST-disabled."
    mechanism: TEST
    evidence_pointer: "test/functional/permission_access_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-PERMISSION-VISIBILITY
    requirement: "Scores reflect only the requester's visible issue set under Redmine permission fixtures (private issues, issues_visibility:own incl. group-assigned, hidden trackers, repository-disabled, anonymous/non-member). A blocker NOT visible to the requester is NOT counted in blocked_load (matches IssueRelation#visible? both-endpoints rule); a hidden blocker leaks via neither blocked_count, dominant_signal, lens order, nor drill context."
    mechanism: TEST
    evidence_pointer: "test/functional/permission_visibility_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-READ-ONLY
    requirement: "No write to Redmine domain tables; only plugin settings/cache tables written."
    mechanism: AGENT_CHECK
    evidence_pointer: "read-only verification + test/functional/read_only_test.rb (DB write-guard on domain tables + static scan for save/update/destroy/touch outside plugin-owned models)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-API-SCHEMA
    requirement: "portfolio.json + projects/:id.json responses validate against published schemas; seeds validate. Schemas ENFORCE (not just describe): exactly the five canonical signal keys, canonical lens enum, per-field provenance via const (computed/redmine_timestamp/derived_bucket/version_due_date), Version due dates as date (not date-time), and the projection block (snapshot_computed_at + projected_at + clock_today/time_zone/window/horizons) so time-derived values are reconstructable."
    mechanism: SCHEMA
    evidence_pointer: "contracts/schemas/portfolio.json + contracts/schemas/project.json + test/integration/api_schema_test.rb"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-CACHE-INVALIDATION
    requirement: "Per-input-class invalidation matrix (issue update, issue DELETION, relation add/remove, Version due-date edit, settings change, priority-enum change) affects only relevant snapshots; unrelated project not recomputed; clock advance with zero data change re-projects staleness/momentum WITHOUT snapshot recompute. Visibility-context correctness: a role/group/membership/tracker-permission/module/admin/non-member-override change moves the user to a different visibility_context_id (correct snapshot), never serving stale or over-broad data. Cross-project blocker correctness: a VISIBLE cross-project blocker flipping open<->closed (its updated_on lies outside the scored project) changes blocker_fingerprint and invalidates the snapshot, so blocked_count is never stale."
    mechanism: TEST
    evidence_pointer: "test/unit/cache_invalidation_test.rb + test/functional/cache_clock_split_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-LENSES
    requirement: "Each canonical lens (health/at_risk/stale/done/blocked) produces the defined ranking incl. tie-break by project_id on a fixture portfolio."
    mechanism: TEST
    evidence_pointer: "test/unit/domain/lenses_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-DOMAIN-PURITY
    requirement: "Domain layer imports no Rails/AR/IO; loadable + testable without Redmine."
    mechanism: TEST
    evidence_pointer: "test/unit/domain/domain_purity_test.rb (static import scan) + pure-domain suite runs via test/domain_test_helper.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-OPEN
    requirement: "GPL-2.0 text present; no telemetry/network callout beyond Redmine-internal reads; no SaaS dependency."
    mechanism: AGENT_CHECK
    evidence_pointer: "open-license / no-telemetry verification + static callout scan (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-COMPAT
    requirement: "Plugin installs and tests pass against Redmine 6.1.x on a supported Ruby."
    mechanism: GATE
    evidence_pointer: "CI::redmine-6.1-matrix"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-PERF
    requirement: "Portfolio overview renders from cache within the SOFT-PERF budget for low-hundreds of projects (advisory)."
    mechanism: BENCH
    evidence_pointer: "test/integration/portfolio_perf_bench.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
  - id: AC-I18N
    requirement: "All user-facing strings resolve via config/locales; no hard-coded user-facing English in views/controllers."
    mechanism: TEST
    evidence_pointer: "test/unit/i18n_coverage_test.rb (DESIGNATED — to be authored)"
    coverage_status: DESIGNATED_FOR_DOWNSTREAM
schema_validation_tests:
  - schema: contracts/schemas/portfolio.json
    seed: contracts/seeds/portfolio.yaml
    assert: "seed validates against schema (jsonschema)"
  - schema: contracts/schemas/project.json
    seed: contracts/seeds/project.yaml
    assert: "seed validates against schema (jsonschema)"
